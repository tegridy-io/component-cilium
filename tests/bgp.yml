# Overwrite parameters here

parameters:
  cilium:
    bgp:
      enabled: true
      config:
        nodeSelector:
          matchLabels:
            bgp-policy: a
        virtualRouters:
          - localASN: 64512
            exportPodCIDR: true
            neighbors:
              - peerAddress: '10.0.0.1'
                peerASN: 64512
                eBGPMultihopTTL: 10
                connectRetryTimeSeconds: 120
                holdTimeSeconds: 90
                keepAliveTimeSeconds: 30
                gracefulRestart:
                  enabled: true
                  restartTimeSeconds: 12
